<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" role="img" aria-label="Map of Africa">
  <title>Africa</title>
  <style>
    path { stroke: #fff; stroke-width: 1.5; fill: #94a3b8; cursor: pointer; transition: fill 0.15s; }
    path:hover { fill: #64748b; }
    path.correct { fill: #22c55e; }
    path.wrong { fill: #ef4444; }
    path.target { fill: #fbbf24; stroke: #f59e0b; stroke-width: 2.5; }
  </style>

